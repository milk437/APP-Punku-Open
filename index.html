<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Punku Open | Portafolio Docente 2026</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Variables de Color */
    :root {
      --bg-color: #0d0d0d;
      --text-color: gold;
      --header-bg: #111;
      --sidebar-bg: #1a1a1a;
      --accent-color: gold;
      --secondary-text-color: #ffd700;
      --button-bg: gold;
      --button-text: black;
      --button-hover-bg: #ffcc00;
      --input-bg: #1e1e1e;
      --input-border: #444;
      --shadow-color-light: rgba(255, 215, 0, 0.1);
      --shadow-color-strong: rgba(255, 215, 0, 0.25);
      --shadow-color-hover: rgba(255, 215, 0, 0.5);
      --font-family: 'Inter', sans-serif;
      --red-vivo: #FF0000;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-family);
      margin: 0;
      padding: 0;
    }

    header {
      background-color: var(--header-bg);
      padding: 1.5rem 2rem;
      border-bottom: 2px solid var(--accent-color);
      box-shadow: 0 4px 15px var(--shadow-color-strong);
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      box-sizing: border-box;
      z-index: 1000;
    }

    header .main-title {
      margin: 0;
      font-size: 3.5em;
      color: var(--accent-color);
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    header .main-title .open-red {
      color: var(--red-vivo);
      text-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
    }

    header .subtitle {
      margin-top: 5px;
      font-size: 1.6em;
      color: var(--secondary-text-color);
      opacity: 0.9;
    }

    .header-buttons {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .header-logout-button {
      background-color: var(--accent-color);
      color: var(--button-text);
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .theme-toggle-button {
      background-color: var(--sidebar-bg);
      color: var(--accent-color);
      border: 1px solid var(--accent-color);
      border-radius: 50%;
      width: 45px;
      height: 45px;
      cursor: pointer;
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #hover-message-bar {
      width: 100%;
      background-color: #222;
      color: var(--secondary-text-color);
      padding: 0.8rem 2rem;
      text-align: center;
      min-height: 2.5em;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    #hover-message-bar.visible { opacity: 1; }

    main {
      flex-grow: 1;
      padding: 3rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-buttons-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      width: 100%;
    }

    .app-buttons-container button {
      background: var(--input-bg);
      color: var(--text-color);
      border: 1px solid var(--input-border);
      flex: 1 1 calc(33% - 40px);
      max-width: 300px;
      min-width: 250px;
      padding: 1.2rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      border-radius: 10px;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(255, 215, 0, 0.2);
    }

    .app-buttons-container button:hover {
      background-color: var(--button-hover-bg);
      color: var(--button-text);
      transform: translateY(-5px);
      box-shadow: 0 8px 20px var(--shadow-color-hover);
    }

    .app-buttons-container button .icon { font-size: 1.8em; }

    footer {
      background-color: #111;
      color: gold;
      padding: 1.5rem;
      text-align: center;
      border-top: 1px solid var(--input-border);
    }

    @media (max-width: 600px) {
      header .main-title { font-size: 2em; }
      .app-buttons-container button { flex: 1 1 100%; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    </div>
    <div class="header-buttons">
        <button id="themeToggleButton" class="theme-toggle-button" aria-label="Alternar tema">

        <button onclick="window.open('https://milk437.github.io/APPPUNKUOPENASISTENCIA', '_blank')" data-message="Registro rápido para estudiantes.">
            <span class="icon">📈</span> Registro Asistencia
        </button>
        <button onclick="window.open('https://script.google.com/macros/s/AKfycbyc00s3-NVRTrUAxYymHZBeDxdCCsy6KLcgt78ZYXHwTYbcgHkhcTMwI3WbzlfzLh9k/exec', '_blank')" data-message="Control de calificaciones y progreso.">
            <span class="icon">📋</span> Registro Auxiliar
        </button>

        <button onclick="window.open('https://script.google.com/macros/s/AKfycbzc2f0KwjQFbnAN_RHCzK5V7Yp3yjaUE5wZdY2a0bDgBMB0zEb7eC7faBP5Mt1ZHYUM6Q/exec', '_blank')" data-message="Captura y organiza trabajos de alumnos (1° a 5°) directamente en tu Google Drive.">
    <span class="icon">📸</span> Gestor de Evidencias
</button>

        <button onclick="window.open('https://script.google.com/macros/s/AKfycbxSK63LXw14CYgAd6IIcBNVxwyL_WL2QdkS2no3fwNuob5CnZq8MG76UzDXIGUXR6vo/exec', '_blank')" data-message="Planifica tu año escolar con apoyo de IA.">

        </button>
        <button onclick="window.open('https://script.google.com/macros/s/AKfycbwwVemRfsWiodDwXx82C7rAs5wHYcBaLb_K7LNnZQadbmTb7750o17ZVxH7kxeiH4Pc/exec', '_blank')" data-message="Crea unidades didácticas por competencias.">
            <span class="icon">📝</span> Unidades de Aprendizaje
        </button>
        <button onclick="window.open('https://script.google.com/macros/s/AKfycbweomn-6o4Mgd_0d6taP8-i-a3H-7_QuFDvfXZ2Ot6wUCuBX6fC3F-AWCqJ01A601o0iQ/exec', '_blank')" data-message="Desarrolla proyectos basados en problemas.">
            <span class="icon">💡</span> Proyectos de Aprendizaje
        </button>
        <button onclick="window.open('https://milk437.github.io/PunkuOpen/', '_blank')" data-message="Gestiona tus sesiones de clase.">
            <span class="icon">🚪</span> Sesiones de Aprendizaje
        </button>
        <button onclick="location.href='resumen.html'" data-message="Genera resúmenes automáticos con IA.">
            <span class="icon">🧠</span> Generador de Resúmenes
        </button>
        <button onclick="location.href='podcast.html'" data-message="Crea guiones para podcasts educativos y radio escolar.">
            <span class="icon">🎙️</span> Guion de Podcast
        </button>
        <button onclick="window.open('https://script.google.com/macros/s/AKfycbxhv_t44nRkUI6rP6vlcw-hss2lIWjzHHKn9cgcIvOr57dut7LPFOhzY5-7NjxumIJf/exec', '_blank')" data-message="Redacción creativa de textos con IA.">

        </button>
        <button onclick="window.open('https://milk437.github.io/PUNKUOPEN-DICCIONARIO/', '_blank')" data-message="Amplía tu vocabulario pedagógico.">

        </button>
      </div>
    </main>
  </div>

  <footer>
    <p>&copy; 2026 Punku Open. Milton Ruiz - Todos los Derechos Reservados.</p>
  </footer>

  <script src="app.js"></script>
  <script>
    const usuario = localStorage.getItem("usuarioActivoPunku");
    const saludoUsuarioElement = document.getElementById("usuarioActivo");
    const hoverMessageBar = document.getElementById("hover-message-bar");

    if (!usuario) {
      location.href = "login.html"; 
    } else {
      saludoUsuarioElement.innerHTML = `👤 Bienvenido, <strong>${usuario}</strong>.`;
      setupButtonHoverMessages(); 
    }

    function cerrarSesion() {
      localStorage.removeItem("usuarioActivoPunku");
      location.href = "login.html";
    }

    // Lógica del Tema
    const themeToggleButton = document.getElementById('themeToggleButton');
    if (themeToggleButton) {
      themeToggleButton.addEventListener('click', () => {
        document.body.classList.toggle('light-theme');
        const isLight = document.body.classList.contains('light-theme');
        themeToggleButton.querySelector('.icon').textContent = isLight ? '🌙' : '☀️';
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
      });
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme');
        themeToggleButton.querySelector('.icon').textContent = '🌙';
      }
    }

    function setupButtonHoverMessages() {
      const navButtons = document.querySelectorAll('.app-buttons-container button');
      navButtons.forEach(button => {
        const message = button.getAttribute('data-message');
        if (message) {
          button.addEventListener('mouseover', () => {
            hoverMessageBar.textContent = message;
            hoverMessageBar.classList.add('visible');
          });
          button.addEventListener('mouseout', () => {
            setTimeout(() => { hoverMessageBar.classList.remove('visible'); }, 500);
          });
        }
      });
    }
  </script>
</body>
</html>
