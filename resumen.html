<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resúmenes | Punku Open</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <header style="text-align:center; padding: 20px;">
    <h1>Punku Open</h1>
    <p>🧠 Generador de Resúmenes Llama 3</p>
    <button onclick="location.href='index.html'">🏠 Menú principal</button>
  </header>

  <main style="padding: 2rem; max-width: 800px; margin: auto;">
    <label>Tipo:
      <select id="inputType">
        <option value="book">📘 Libro</option>
        <option value="url">🌐 Enlace Web</option>
      </select>
    </label><br/><br/>

    <div id="bookInputs">
      <input type="text" id="inputTitle" placeholder="Título" style="width:100%;"><br/><br/>
      <input type="text" id="inputAuthor" placeholder="Autor" style="width:100%;">
    </div>

    <div id="urlInputs" style="display: none;">
      <input type="url" id="inputUrl" placeholder="https://..." style="width:100%;">
    </div>
    <br/>

    <label>Extensión:
      <select id="targetWordCount">
        <option value="150">150 palabras</option>
        <option value="300" selected>300 palabras</option>
        <option value="600">600 palabras</option>
      </select>
    </label><br/><br/>

    <button onclick="generarResumen()">✨ Generar</button>
    <button onclick="copiarResumen()">📋 Copiar</button>
    <button onclick="descargarPDF()">⬇️ PDF</button>
    <button onclick="descargarWord()">📝 Word</button>
    <button onclick="enviarWhatsapp()">🟢 WhatsApp</button>

    <p id="mensaje"></p>
    <p id="error"></p>

    <section id="resultado" style="margin-top:20px;"></section>
  </main>

  <script src="resumen.js"></script>
</body>
</html>
