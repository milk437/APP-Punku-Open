<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Punku Open | Generador de Resúmenes Pedagógicos</title>
  <style>
    /* Estética Punku Open: Negro y Dorado */
    :root {
      --bg-color: #0d0d0d;
      --text-color: gold;
      --card-bg: #1a1a1a;
      --accent: gold;
      --input-bg: #1e1e1e;
      --border: #444;
      --btn-hover: #ffcc00;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #111;
      padding: 25px;
      text-align: center;
      border-bottom: 2px solid var(--accent);
      box-shadow: 0 4px 10px rgba(255, 215, 0, 0.2);
    }

    header h1 { margin: 0; font-size: 2.2em; text-shadow: 0 0 8px gold; }

    main {
      max-width: 800px;
      margin: 30px auto;
      background: var(--card-bg);
      padding: 30px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      flex-grow: 1;
    }

    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--accent); }
    
    select, input, textarea {
      width: 100%;
      padding: 12px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: white;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 1rem;
    }

    select:focus, input:focus { border-color: var(--accent); outline: none; }

    .btn-main {
      background: var(--accent);
      color: black;
      padding: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      font-size: 1.1rem;
      transition: 0.3s;
      text-transform: uppercase;
    }

    .btn-main:hover { background: var(--btn-hover); transform: translateY(-2px); box-shadow: 0 0 15px gold; }

    #resultadoArea {
      margin-top: 30px;
      display: none;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }

    #promptOutput {
      background: #000;
      color: #00ff41;
      font-family: 'Consolas', 'Courier New', monospace;
      height: 250px;
      border: 1px solid var(--accent);
      margin-bottom: 15px;
    }

    .btn-action {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-right: 10px;
      transition: 0.3s;
    }

    footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #666; }
  </style>
</head>
<body>

<header>
  <h1>Punku Open</h1>
  <p>Resúmenes de Alto Nivel para Docentes</p>
</header>

<main>
  <div class="form-group">
    <label>Tipo de Recurso:</label>
    <select id="tipoRecurso">
      <option value="libro">📘 Obra Literaria / Libro</option>
      <option value="enlace">🌐 Artículo Web / Noticia</option>
    </select>
  </div>

  <div id="seccionLibro">
    <div class="form-group"><input type="text" id="tituloLibro" placeholder="Título (ej: Tradiciones Peruanas)"></div>
    <div class="form-group"><input type="text" id="autorLibro" placeholder="Autor (ej: Ricardo Palma)"></div>
  </div>

  <div id="seccionEnlace" style="display: none;">
    <div class="form-group"><input type="url" id="urlWeb" placeholder="https://ejemplo.com/articulo-educativo"></div>
  </div>

  <div class="form-group">
    <label>Extensión deseada (Palabras aproximadas):</label>
    <select id="longitudResumen">
      <option value="250">Sintético (250 palabras)</option>
      <option value="500" selected>Estándar (500 palabras)</option>
      <option value="850">Profundo (850 palabras)</option>
    </select>
  </div>

  <button class="btn-main" onclick="generarPromptResumen()">✨ Preparar Instrucción Maestra</button>

  <div id="resultadoArea">
    <label>📋 Instrucción generada (Copia y pega en tu IA):</label>
    <textarea id="promptOutput" readonly></textarea>
    <div style="display: flex;">
      <button class="btn-action" style="background: #444; color: white;" onclick="copiarAlPortapapeles()">📋 Copiar Prompt</button>
      <button class="btn-action" style="background: #25d366; color: white;" onclick="compartirWhatsApp()">🟢 WhatsApp</button>
    </div>
  </div>
</main>

<footer>&copy; 2026 Punku Open | Tecnología Educativa Peruana</footer>

<script src="resumen.js"></script>
</body>
</html>
