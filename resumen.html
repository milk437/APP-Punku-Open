<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Punku Open | Generador de Resúmenes</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body style="font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; margin: 0; padding: 0;">

  <header style="background: #2c3e50; color: white; padding: 25px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
    <h1 style="margin: 0; font-size: 2rem;">Punku Open</h1>
    <p style="margin: 5px 0; opacity: 0.9;">🧠 Inteligencia Artificial para el Aula</p>
    <button onclick="location.href='index.html'" style="margin-top: 10px; cursor: pointer; padding: 8px 20px; border-radius: 20px; border: none; background: #34495e; color: white;">🏠 Volver al Inicio</button>
  </header>

  <main style="max-width: 750px; margin: 30px auto; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
    
    <div style="margin-bottom: 20px;">
      <label><b>¿Qué vamos a resumir hoy?</b></label>
      <select id="inputType" style="width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd;">
        <option value="book">📘 Libro u Obra Literaria</option>
        <option value="url">🌐 Enlace de Internet / Artículo</option>
      </select>
    </div>

    <div id="bookInputs">
      <input type="text" id="inputTitle" placeholder="Título del libro (ej: Los heraldos negros)" style="width: 96%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ddd;">
      <input type="text" id="inputAuthor" placeholder="Autor (ej: César Vallejo)" style="width: 96%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
    </div>

    <div id="urlInputs" style="display: none;">
      <input type="url" id="inputUrl" placeholder="https://ejemplo.com/noticia-importante" style="width: 96%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
    </div>

    <div style="margin-top: 20px;">
      <label><b>Extensión del resumen:</b></label>
      <select id="targetWordCount" style="width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd;">
        <option value="150">Breve (150 palabras)</option>
        <option value="350" selected>Normal (350 palabras)</option>
        <option value="600">Extenso (600 palabras)</option>
      </select>
    </div>

    <div style="margin-top: 30px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
      <button onclick="generarResumen()" style="background: #2ecc71; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem;">✨ Generar Resumen</button>
      
      <button onclick="copiarResumen()" style="background: #95a5a6; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer;">📋 Copiar</button>
      <button onclick="descargarPDF()" style="background: #e74c3c; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer;">⬇️ PDF</button>
      <button onclick="enviarWhatsapp()" style="background: #25d366; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer;">🟢 WhatsApp</button>
    </div>

    <p id="mensaje" style="text-align: center; color: #3498db; font-weight: bold; margin-top: 20px; min-height: 24px;"></p>
    <p id="error" style="text-align: center; color: #e74c3c; font-weight: bold; margin-top: 10px;"></p>

    <div id="resultado" style="margin-top: 20px;"></div>
  </main>

  <footer style="text-align: center; padding: 30px; color: #bdc3c7; font-size: 0.85rem;">
    &copy; 2026 Punku Open | Herramienta para Docentes
  </footer>

  <script src="resumen.js"></script>
</body>
</html>
