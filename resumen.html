<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Punku Open | Resúmenes Pedagógicos</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --gold: #ffd700;
      --card: #1a1a1a;
      --input: #252525;
      --border: #444;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--gold); margin: 0; padding-bottom: 50px; }
    header { background: #111; padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); box-shadow: 0 4px 15px rgba(255,215,0,0.2); }
    main { max-width: 700px; margin: 30px auto; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--border); }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    select, input, textarea { width: 100%; padding: 12px; background: var(--input); border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; }
    select:focus, input:focus { border-color: var(--gold); outline: none; }
    .btn-main { background: var(--gold); color: black; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; text-transform: uppercase; transition: 0.3s; }
    .btn-main:hover { background: #ffcc00; box-shadow: 0 0 20px rgba(255,215,0,0.4); transform: translateY(-2px); }
    #resultadoArea { margin-top: 30px; display: none; border-top: 1px solid var(--border); padding-top: 20px; }
    #promptOutput { background: #000; color: #00ff41; font-family: 'Consolas', monospace; height: 200px; border: 1px solid var(--gold); resize: none; margin-bottom: 15px; }
    .btn-action { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-right: 10px; }
    footer { text-align: center; color: #555; font-size: 0.8rem; margin-top: 20px; }
  </style>
</head>
<body>

<header>
  <h1>Punku Open</h1>
  <p>Generador de Instrucciones de Resumen para IA</p>
</header>

<main>
  <div class="form-group">
    <label>Tipo de Recurso:</label>
    <select id="tipoRecurso">
      <option value="libro">📘 Obra Literaria / Libro</option>
      <option value="enlace">🌐 Artículo Web / Noticia</option>
    </select>
  </div>

  <div id="seccionLibro">
    <div class="form-group"><input type="text" id="tituloLibro" placeholder="Título de la obra"></div>
    <div class="form-group"><input type="text" id="autorLibro" placeholder="Autor de la obra"></div>
  </div>

  <div id="seccionEnlace" style="display: none;">
    <div class="form-group"><input type="url" id="urlWeb" placeholder="https://enlace-del-articulo.com"></div>
  </div>

  <div class="form-group">
    <label>Extensión del Resumen:</label>
    <select id="longitudResumen">
      <option value="250">Sintético (250 palabras)</option>
      <option value="500" selected>Estándar (500 palabras)</option>
      <option value="850">Profundo (850 palabras)</option>
    </select>
  </div>

  <button class="btn-main" onclick="generarPromptResumen()">✨ Preparar Instrucción Maestra</button>

  <div id="resultadoArea">
    <label style="color: #fff;">📋 Instrucción lista (Copia y pega en Gemini/ChatGPT):</label>
    <textarea id="promptOutput" readonly></textarea>
    <div style="display: flex;">
      <button class="btn-action" style="background: #444; color: white;" onclick="copiarPrompt()">📋 Copiar</button>
      <button class="btn-action" style="background: #25d366; color: white;" onclick="enviarWhatsApp()">🟢 WhatsApp</button>
    </div>
  </div>
</main>

<footer>Punku Open 2026 | Desarrollado para el Magisterio Peruano</footer>

<script src="resumen.js"></script>
</body>
</html>
