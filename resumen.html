<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Resúmenes | Punku Open</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <button id="themeToggleButton" class="theme-toggle-button" aria-label="Alternar tema">
    <span class="icon">☀️</span>
  </button>

  <header>
    <h1>Punku Open</h1>
    <p>🧠 Generador de Resúmenes (Llama 3)</p>
    <div style="margin-top: 0.5rem;">
      <span id="usuarioActivo" style="font-size: 0.9rem;"></span><br />
      <button onclick="cerrarSesion()" style="margin-top: 0.5rem;">🔓 Cerrar sesión</button><br />
      <button onclick="location.href='index.html'" style="margin-top: 0.5rem;">🏠 Menú principal</button>
    </div>
  </header>

  <main style="padding: 2rem; max-width: 800px; margin: auto;">
    <section>
      <label><b>Tipo de entrada:</b>
        <select id="inputType">
          <option value="book">📘 Libro / Obra</option>
          <option value="url">🌐 Enlace Web</option>
          <option value="video">🎬 Video</option>
        </select>
      </label><br/><br/>

      <div id="bookInputs">
        <input type="text" id="inputTitle" placeholder="Título del libro" style="width: 100%;"><br/><br/>
        <input type="text" id="inputAuthor" placeholder="Autor (opcional)" style="width: 100%;">
      </div>

      <div id="urlInputs" style="display: none;">
        <input type="url" id="inputUrl" placeholder="Pega aquí la URL (web o video)" style="width: 100%;">
      </div>
      
      <br/>

      <label><b>Longitud del resumen:</b>
        <select id="targetWordCount">
          <option value="100">100 palabras</option>
          <option value="200" selected>200 palabras</option>
          <option value="500">500 palabras</option>
          <option value="libre">Libre</option>
        </select>
      </label><br/><br/>

      <div class="button-container">
          <button onclick="generarResumen()" style="background-color: #007bff; color: white; padding: 10px 20px; font-weight: bold;">✨ Generar Resumen</button>
          <button onclick="copiarResumen()">📋 Copiar</button>
          <button onclick="descargarPDF()">⬇️ PDF</button>
          <button onclick="descargarWord()">📝 Word</button>
          <button onclick="enviarCorreo()">📧 Correo</button>
          <button onclick="enviarWhatsapp()" style="background-color: #25d366; color: white;">🟢 WhatsApp</button>
      </div>

      <br/>
      <p id="mensaje" style="color: #007bff; font-weight: bold;"></p>
      <p id="error" style="color: #d93025; font-weight: bold;"></p>
    </section>

    <section id="resultado" style="margin-top: 2rem; border-top: 2px solid #eee; padding-top: 1rem;"></section>
  </main>

  <footer>
    <p>&copy; 2026 Punku Open | Educación Digital</p>
  </footer>

  <script src="resumen.js"></script>
  <script src="app.js"></script>
</body>
</html>
