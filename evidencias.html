<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Punku Open | Gestor de Evidencias</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .upload-card {
      background: #1a1a1a;
      border: 1px solid gold;
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
      margin: 20px auto;
    }
    .form-group { margin-bottom: 15px; text-align: left; }
    label { display: block; color: gold; margin-bottom: 5px; font-weight: bold; }
    select, input {
      width: 100%;
      padding: 12px;
      background: #0d0d0d;
      border: 1px solid #444;
      color: white;
      border-radius: 8px;
      box-sizing: border-box;
    }
    .btn-camera {
      background: gold;
      color: black;
      font-weight: bold;
      padding: 15px;
      border: none;
      border-radius: 8px;
      width: 100%;
      cursor: pointer;
      margin-top: 10px;
    }
    #status { margin-top: 15px; font-size: 0.9em; }
  </style>
</head>
<body>
  <main>
    <h1>📂 Gestor de Evidencias</h1>
    <div class="upload-card">
      <div class="form-group">
        <label>Estudiante / N° de Orden:</label>
        <input type="text" id="nombreEstudiante" placeholder="Ej: 05 - Perez Ruiz">
      </div>
      <div class="form-group">
        <label>Sesión / Actividad:</label>
        <input type="text" id="actividad" placeholder="Ej: Sesion 04 - DPCC">
      </div>
      <div class="form-group">
        <label>Capturar Evidencia:</label>
        <input type="file" id="fotoEvidencia" accept="image/*" capture="environment">
      </div>
      <button class="btn-camera" onclick="subirEvidencia()">🚀 Subir a Google Drive</button>
      <div id="status"></div>
    </div>
    <button onclick="location.href='index.html'" style="background:none; color:gold; border:none; cursor:pointer;">⬅ Volver</button>
  </main>

  <script>
    function subirEvidencia() {
      const fileInput = document.getElementById('fotoEvidencia');
      const nombre = document.getElementById('nombreEstudiante').value;
      const actividad = document.getElementById('actividad').value;
      const status = document.getElementById('status');

      if (!fileInput.files[0] || !nombre) {
        alert("Por favor, selecciona una foto y escribe el nombre.");
        return;
      }

      status.innerHTML = "⏳ Subiendo archivo... por favor espera.";
      status.style.color = "gold";

      const reader = new FileReader();
      reader.onload = function() {
        const base64 = reader.result.split(',')[1];
        const contentType = fileInput.files[0].type;
        const nombreArchivo = `${nombre}_${actividad}.jpg`;

        // Llamada a la función de Google Apps Script
        google.script.run
          .withSuccessHandler(url => {
            status.innerHTML = `✅ ¡Éxito! Archivo guardado. <br><a href="${url}" target="_blank" style="color:white;">Ver en Drive</a>`;
            document.getElementById('fotoEvidencia').value = "";
          })
          .withFailureHandler(err => {
            status.innerHTML = "❌ Error al subir: " + err;
            status.style.color = "red";
          })
          .guardarEnDrive(base64, contentType, nombreArchivo);
      };
      reader.readAsDataURL(fileInput.files[0]);
    }
  </script>
</body>
</html>
